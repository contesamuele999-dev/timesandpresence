<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Presencer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0A5A"/>
      <stop offset="1" stop-color="#00003D"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF7A00"/>
      <stop offset="1" stop-color="#E86B00"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)"/>
  <!-- calendar body -->
  <rect x="14" y="16" width="36" height="34" rx="7" fill="#fff"/>
  <rect x="14" y="16" width="36" height="11" rx="7" fill="url(#acc)"/>
  <rect x="14" y="22" width="36" height="5" fill="url(#acc)"/>
  <!-- hangers -->
  <rect x="22" y="11" width="5" height="10" rx="2.5" fill="#FFD8B0"/>
  <rect x="37" y="11" width="5" height="10" rx="2.5" fill="#FFD8B0"/>
  <!-- presence check -->
  <path d="M23 37 l6 6 l12 -13" fill="none" stroke="#E86B00" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
