<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Times & Presence</title>
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#00003D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Times&Presence">
<style>
  :root{
    --brand:#E86B00;
    --brand-light:#FF7A00;
    --dark:#00003D;
    --bg:#F6F5F3;
    --card:#FFFFFF;
    --line:#E7E5E1;
    --text:#1B1B2A;
    --muted:#6b6b7a;
    --ok:#1E9E5A;
    --ok-bg:#E7F7EE;
    --danger:#D6412F;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;-webkit-font-smoothing:antialiased}
  #app{min-height:100vh;display:flex;flex-direction:column}
  button{font:inherit;cursor:pointer}
  input,select,textarea{font:inherit}
  a{color:inherit}

  .hidden{display:none !important}

  /* ---------- layout ---------- */
  header.topbar{
    position:sticky;top:0;z-index:20;background:var(--dark);color:#fff;
    display:flex;align-items:center;gap:12px;padding:12px 16px;
  }
  header.topbar .brand{font-weight:800;letter-spacing:.2px;font-size:18px;flex:1;
    display:flex;align-items:center;gap:8px;overflow:hidden}
  header.topbar .brand small{display:block;font-weight:500;font-size:12px;opacity:.75;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  header.topbar button.icon{background:none;border:none;color:#fff;font-size:22px;padding:6px}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;overflow:hidden;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
  .avatar img{width:100%;height:100%;object-fit:cover}

  main{flex:1;padding:16px;max-width:920px;margin:0 auto;width:100%;padding-bottom:96px}

  nav.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:#fff;
    border-top:1px solid var(--line);display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    box-shadow:0 -2px 12px rgba(0,0,0,.05)}
  nav.tabbar button{flex:1;background:none;border:none;display:flex;flex-direction:column;
    align-items:center;gap:2px;padding:6px 2px;border-radius:12px;color:var(--muted);font-size:11px;font-weight:600}
  nav.tabbar button .ic{font-size:20px}
  nav.tabbar button.active{color:var(--brand)}

  /* ---------- cards & basics ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:14px}
  h1{font-size:22px;margin:0 0 4px}
  h2{font-size:18px;margin:0 0 10px}
  h3{font-size:15px;margin:0 0 8px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  p.hint{color:var(--muted);font-size:13px;margin:4px 0 0}

  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:10px}
  .grow{flex:1}
  .between{justify-content:space-between}
  .center{justify-content:center}

  label.field{display:block;margin-bottom:12px}
  label.field span{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
  input[type=text],input[type=email],input[type=password],input[type=date],input[type=time],select,textarea{
    width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--text)
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}

  button.btn{border:none;border-radius:12px;padding:13px 18px;font-weight:700;font-size:15px;
    background:var(--brand);color:#fff;transition:transform .05s, opacity .15s}
  button.btn:active{transform:scale(.97)}
  button.btn.secondary{background:#fff;color:var(--text);border:1.5px solid var(--line)}
  button.btn.ghost{background:none;color:var(--brand);padding:8px 10px}
  button.btn.danger{background:var(--danger)}
  button.btn.block{width:100%}
  button.btn.sm{padding:8px 12px;font-size:13px;border-radius:10px}
  button.btn:disabled{opacity:.5}

  .pill{display:inline-flex;align-items:center;gap:6px;background:#F0EEEA;border-radius:999px;
    padding:5px 12px;font-size:12px;font-weight:700;color:var(--muted)}
  .pill.brand{background:#FFF1E4;color:var(--brand)}
  .pill.ok{background:var(--ok-bg);color:var(--ok)}

  .tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;background:#F0EEEA;color:var(--muted)}
  .tag.estate{background:#FFF1E4;color:#B85400}
  .tag.inverno{background:#E7F0FF;color:#2D5FB0}
  .tag.extra{background:#F3E8FF;color:#7C3AED}

  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--dark);
    color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:100;
    box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:90vw;text-align:center}

  .empty{text-align:center;color:var(--muted);padding:34px 10px}
  .empty .big{font-size:38px;margin-bottom:8px}

  .spinner{width:26px;height:26px;border:3px solid #e5e3df;border-top-color:var(--brand);
    border-radius:50%;animation:spin .7s linear infinite;margin:30px auto}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- login ---------- */
  .authwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .authbox{width:100%;max-width:400px}
  .logo{text-align:center;margin-bottom:22px}
  .logo .mark{width:56px;height:56px;border-radius:16px;background:var(--brand);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px;font-weight:800}
  .logo h1{margin:0}
  .logo p{color:var(--muted);margin:4px 0 0;font-size:14px}
  .authtabs{display:flex;background:#F0EEEA;border-radius:12px;padding:4px;margin-bottom:16px}
  .authtabs button{flex:1;border:none;background:none;padding:10px;border-radius:9px;font-weight:700;
    font-size:13px;color:var(--muted)}
  .authtabs button.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .errbox{background:#FDECEA;color:#B3261E;border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:12px}

  /* ---------- week nav ---------- */
  .weeknav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .weeknav button.arrow{background:#fff;border:1.5px solid var(--line);border-radius:10px;
    width:40px;height:40px;font-size:18px;flex-shrink:0}
  .weeknav .wk{flex:1;text-align:center;font-weight:700;font-size:14px;overflow:hidden}
  .weeknav .wk small{display:block;font-weight:500;color:var(--muted);font-size:12px}
  .weeknav .wk.wk-in-right{animation:wkInRight .22s ease-out}
  .weeknav .wk.wk-in-left{animation:wkInLeft .22s ease-out}

  #daysHost{overflow:hidden}
  #daysHost.wk-in-right{animation:wkInRight .24s ease-out}
  #daysHost.wk-in-left{animation:wkInLeft .24s ease-out}
  @keyframes wkInRight{from{transform:translateX(28px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes wkInLeft{from{transform:translateX(-28px);opacity:0}to{transform:translateX(0);opacity:1}}

  select.calpick{border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;font-weight:700}

  /* ---------- day / slot cards ---------- */
  .day{margin-bottom:16px}
  .day h3.dayhead{display:flex;align-items:center;justify-content:space-between;
    text-transform:none;letter-spacing:0;color:var(--text);font-size:15px;font-weight:800;margin-bottom:8px}
  .day h3.dayhead .d{color:var(--muted);font-weight:600;font-size:13px}
  .slot{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);
    border-radius:14px;background:#fff;margin-bottom:8px}
  .slot .time{width:64px;flex-shrink:0;font-weight:800;font-size:13px;line-height:1.25;color:var(--dark)}
  .slot .info{flex:1;min-width:0}
  .slot .info .lbl{font-weight:700;font-size:14px}
  .slot .info .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .slot.extra{border-color:#E4D3FF;background:#FBF8FF}

  button.togglebtn{flex-shrink:0;border:1.5px solid var(--line);border-radius:12px;background:#fff;
    padding:10px 14px;font-weight:700;font-size:13px;color:var(--muted);display:flex;gap:6px;align-items:center}
  button.togglebtn.on{background:var(--ok-bg);border-color:#BFE8D2;color:var(--ok)}

  .matrixwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .matrixwrap{position:relative}
  .matrixhint{font-size:11px;color:var(--muted);text-align:right;margin:-4px 0 6px;padding:0 2px}
  table.matrix{border-collapse:separate;border-spacing:0 2px;width:100%}
  table.matrix th,table.matrix td{padding:6px;text-align:center;font-size:12px;white-space:nowrap}
  table.matrix thead th{padding-bottom:10px;vertical-align:bottom}
  table.matrix td{border-bottom:1px solid var(--line)}
  table.matrix tbody tr td:first-child{border-radius:10px 0 0 10px}
  table.matrix tbody tr td:last-child{border-radius:0 10px 10px 0}
  table.matrix td:first-child,table.matrix th:first-child{
    text-align:left;position:sticky;left:0;background:var(--card);z-index:2;
    min-width:118px;padding-right:12px;font-weight:700;font-size:13px;
    box-shadow:3px 0 8px -4px rgba(0,0,0,.15)
  }
  table.matrix th:not(:first-child),table.matrix td:not(:first-child){min-width:52px}
  table.matrix tbody tr:nth-child(odd) td{background:#FBFAF8}
  table.matrix tbody tr:nth-child(odd) td:first-child{background:#FBFAF8}

  .mhead-person{display:flex;flex-direction:column;align-items:center;gap:4px}
  .mavatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:12px;flex-shrink:0;overflow:hidden}
  .mavatar img{width:100%;height:100%;object-fit:cover}
  .mavatar.guest{border:2px dashed rgba(255,255,255,.7)}
  .mname{font-size:10.5px;font-weight:700;color:var(--muted);max-width:56px;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}

  .mchip{position:relative;display:inline-flex;width:34px;height:34px;border-radius:10px;
    border:2px solid var(--line);background:#fff;transition:transform .1s ease,background .15s,border-color .15s}
  .mchip.on{background:var(--ok);border-color:var(--ok)}
  .mchip.on::after{content:'';position:absolute;left:11px;top:15px;width:11px;height:6px;
    border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(-45deg)}
  .mchip:active{transform:scale(.9)}

  @media (max-width:480px){
    table.matrix th:not(:first-child),table.matrix td:not(:first-child){min-width:46px}
    .mchip{width:30px;height:30px;border-radius:9px}
    .mchip.on::after{left:9px;top:13px;width:10px;height:5px}
    table.matrix td:first-child,table.matrix th:first-child{min-width:96px;font-size:12px}
  }

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,15,.45);z-index:50;display:flex;
    align-items:flex-end;justify-content:center}
  .modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;
    max-height:88vh;overflow:auto;animation:up .18s ease-out}
  @media (min-width:560px){
    .modal-bg{align-items:center}
    .modal{border-radius:20px}
  }
  @keyframes up{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal .mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .modal .mhead h2{margin:0}
  .modal .mhead button{background:none;border:none;font-size:22px;color:var(--muted)}

  .listrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .listrow:last-child{border-bottom:none}
  .listrow .main{flex:1;min-width:0}
  .listrow .main .t{font-weight:700;font-size:14px}
  .listrow .main .s{font-size:12px;color:var(--muted)}

  .copybox{display:flex;gap:8px;align-items:center;background:#F6F5F3;border-radius:10px;padding:10px 12px;
    font-family:monospace;font-size:14px;word-break:break-all}

  .segbtns{display:flex;gap:8px;flex-wrap:wrap}
  .segbtns button{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:8px 12px;
    font-size:13px;font-weight:700;color:var(--muted)}
  .segbtns button.on{background:var(--brand);border-color:var(--brand);color:#fff}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
